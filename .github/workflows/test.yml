name: Aga Global Tech - Lens AI Native Build
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Build Dependencies
        run: pip install flet flet-camera

      - name: Build Universal APK
        run: |
          # --arch armeabi-v7a is for the Spark 4
          # --permissions camera triggers the Android system pop-up
          flet build apk \
            --project "Lens AI" \
            --product "Lens AI" \
            --org "tech.agaglobal" \
            --arch arm64-v8a armeabi-v7a \
            --permissions camera \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LensAI-Native-Edition
          path: build/apk/*.apk
          
