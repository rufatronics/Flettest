name: Flet Baseline Build
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: flet build apk --project "Lens Test" --product "Lens Test" --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lens-Baseline
          path: build/apk/*.apk
          
